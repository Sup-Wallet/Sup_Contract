[package]
name = "bluefin_spot"
edition = "2024.beta"
# Bluefin Spot CLMM mainnet package (from the official interface repo
# fireflyprotocol/bluefin-spot-contract-interface). This is a lightweight compile
# stub of the surface the adaptor calls; for a real deploy you may instead vendor
# the full BluefinSpot git dependency (note: it pins a different Sui framework rev,
# mainnet-v1.35.2, so reconcile the framework rev across the workspace first).
published-at = "0xd075338d105482f1527cbfd363d6413558f184dec36d9138a70261e87f486e9c"

[dependencies]
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/testnet", override = true }

[addresses]
bluefin_spot = "0x3492c874c1e3b3e2984e8c41b589e642d4d0a5d6459e5a9cfc2d52fd7c89c267"
